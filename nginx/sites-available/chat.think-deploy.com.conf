# Copy to /etc/nginx/sites-available/ and enable (symlink in sites-enabled).
# TLS paths are from Certbot by default.
server {
    server_name chat.think-deploy.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/chat.think-deploy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.think-deploy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = chat.think-deploy.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name chat.think-deploy.com;
    return 404;
}
