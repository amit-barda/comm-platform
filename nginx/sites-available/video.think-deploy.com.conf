# Copy to /etc/nginx/sites-available/ and enable.
server {
    server_name video.think-deploy.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/video.think-deploy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video.think-deploy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = video.think-deploy.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name video.think-deploy.com;
    return 404;
}
