# =============================================================================
# grafana.think-deploy.com  ->  grafana:3000
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name grafana.think-deploy.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name grafana.think-deploy.com;

    ssl_certificate     /etc/letsencrypt/live/grafana.think-deploy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.think-deploy.com/privkey.pem;

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
