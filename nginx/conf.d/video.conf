# =============================================================================
# video.think-deploy.com  ->  jitsi-web:80
# -----------------------------------------------------------------------------
# Jitsi requires WebSocket support on three paths:
#   /xmpp-websocket    Strophe XMPP browser <-> Prosody
#   /colibri-ws/       Browser <-> JVB media bridge channel
#   /http-bind         Legacy BOSH XMPP-over-HTTP fallback
# Without proper Upgrade/Connection forwarding, the browser flashes
# "You have been disconnected" right after joining a room.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name video.think-deploy.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name video.think-deploy.com;

    ssl_certificate     /etc/letsencrypt/live/video.think-deploy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video.think-deploy.com/privkey.pem;

    # Google OAuth bridge (auth-service): /oauth/healthz, /oauth/google, /oauth/google/callback
    location /oauth/ {
        proxy_pass http://auth-service:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # XMPP-over-WebSocket: browser <-> Prosody
    location = /xmpp-websocket {
        proxy_pass http://jitsi-web:80;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        tcp_nodelay on;
    }

    # COLIBRI signalling: browser <-> JVB
    location ~ ^/colibri-ws/ {
        proxy_pass http://jitsi-web:80;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        tcp_nodelay on;
    }

    # BOSH fallback: still used by some clients
    location = /http-bind {
        proxy_pass http://jitsi-web:80;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HTML / JS / CSS / static assets
    location / {
        proxy_pass http://jitsi-web:80;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
