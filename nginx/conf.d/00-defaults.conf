# =============================================================================
# Global http{} settings shared by every vhost.
# Loaded by nginx via the default `include /etc/nginx/conf.d/*.conf;` line.
# =============================================================================

# ---- TLS profile (Mozilla intermediate, May 2024) --------------------------
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ---- WebSocket upgrade helper (Rocket.Chat + Jitsi) ------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- Reasonable upload limit (Jitsi avatars / Rocket.Chat attachments) -----
client_max_body_size 32M;

# ---- Healthcheck + ACME catch-all (server_name _) --------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 444;
    }
}
