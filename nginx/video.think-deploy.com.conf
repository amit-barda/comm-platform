# =============================================================================
# Jitsi Meet vhost — host Nginx -> jitsi-web container on 127.0.0.1:8000
# -----------------------------------------------------------------------------
# Critical: Jitsi requires WebSocket support on three paths:
#   /xmpp-websocket       (Strophe XMPP client <-> Prosody)
#   /colibri-ws/          (browser <-> JVB bridge channel)
#   /bosh                 (legacy XMPP-over-HTTP fallback, still used)
# Without `proxy_set_header Upgrade ...` on these paths the browser shows
# "You have been disconnected" right after joining a room.
# =============================================================================

# ---- map directive must live in the http context ----------------------------
# (placed at file top-level — Nginx will pull it into http{} via the include)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name video.think-deploy.com;

    # Real client IP forwarding (used by Prosody/Jicofo logs).
    set_real_ip_from 127.0.0.1;
    real_ip_header   X-Forwarded-For;

    # Generous limits for upload of avatars / virtual backgrounds.
    client_max_body_size 16M;

    # ---- XMPP over WebSocket (browser <-> Prosody) --------------------------
    location = /xmpp-websocket {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 900s;
        proxy_send_timeout 900s;

        tcp_nodelay on;
    }

    # ---- COLIBRI signalling (browser <-> JVB) -------------------------------
    location ~ ^/colibri-ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 900s;
        proxy_send_timeout 900s;

        tcp_nodelay on;
    }

    # ---- BOSH (XMPP-over-HTTP fallback, still used by some clients) ---------
    location = /http-bind {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Everything else (HTML, JS, CSS, assets) ----------------------------
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Default to upgrade so we don't accidentally break a future WS path.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/video.think-deploy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video.think-deploy.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = video.think-deploy.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name video.think-deploy.com;
    return 404;
}
