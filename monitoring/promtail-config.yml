server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # =========================================================================
  # Host /var/log/*.log
  # =========================================================================
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: thinkdeploy-server
          __path__: /var/log/*.log

  # =========================================================================
  # All Docker containers, discovered via the Docker socket.
  # Labels on each log line:
  #   job        = "docker"
  #   service    = compose service name   (rocketchat, jitsi-web, ...)
  #   container  = container name         (auth-service, jitsi-jvb, ...)
  #   image      = image reference        (jitsi/web:stable-9909, ...)
  #   project    = compose project name   (comm-platform)
  # The pipeline parses Docker's JSON log format so the message body becomes
  # the actual log line and `time` is mapped onto the line's timestamp.
  # =========================================================================
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      - source_labels: ['__meta_docker_container_label_org_opencontainers_image_ref_name']
        target_label: 'image'
      - target_label: 'job'
        replacement: 'docker'
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: output
