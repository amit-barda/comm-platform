# =============================================================================
# Secure Communication Platform — root compose stack
# -----------------------------------------------------------------------------
# Includes: Rocket.Chat, MongoDB (+ replica-set init), Auth Service (Google
# OAuth -> JWT), Grafana, Prometheus, Node Exporter, Loki, Promtail.
#
# Jitsi is intentionally NOT in this file — it lives under ./jitsi as the
# upstream docker-jitsi-meet stack (see jitsi/README.md).
#
# All application ports are bound to 127.0.0.1 only; the host Nginx terminates
# TLS and proxies them publicly.
# =============================================================================

services:

  # ---------------------------------------------------------------- MongoDB --
  mongodb:
    image: mongo:7.0
    container_name: rocketchat-mongodb
    restart: unless-stopped
    command: >
      mongod --oplogSize 128 --replSet rs0 --storageEngine=wiredTiger
      --bind_ip_all
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongodb-init-replica:
    image: mongo:7.0
    container_name: rocketchat-mongodb-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend
    command: >
      bash -c "
      mongosh --host mongodb:27017 --quiet --eval '
        try { rs.status(); print(\"replica set already initialised\"); }
        catch (e) {
          rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"mongodb:27017\" }] });
        }
      '
      "

  # ------------------------------------------------------------ Rocket.Chat --
  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:8.0.1
    container_name: rocketchat
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init-replica:
        condition: service_completed_successfully
    environment:
      ROOT_URL: ${ROCKETCHAT_ROOT_URL}
      PORT: 3000
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      DEPLOY_METHOD: docker
      MAIL_URL: ${ROCKETCHAT_MAIL_URL:-}
      OVERWRITE_SETTING_SMTP_Username: ${SMTP_USERNAME:-}
      OVERWRITE_SETTING_SMTP_Password: ${SMTP_PASSWORD:-}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - backend
      - frontend
      - monitoring
    # The official Rocket.Chat image ships with `wget` (not `curl`) — use shell
    # form so the redirect/exit-code semantics work correctly.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/info >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ----------------------------------------------------- Auth Service (JWT) --
  auth-service:
    build:
      context: ./auth-service
    image: comm-platform/auth-service:local
    container_name: auth-service
    restart: unless-stopped
    environment:
      PORT: 3001
      PUBLIC_BASE_URL: ${AUTH_PUBLIC_BASE_URL:-https://auth.think-deploy.com}
      JITSI_PUBLIC_URL: ${JITSI_PUBLIC_URL:-https://video.think-deploy.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_APP_ID: ${JWT_APP_ID:-thinkdeploy}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-thinkdeploy}
      JWT_ISSUER: ${JWT_ISSUER:-thinkdeploy}
      # Internal Jitsi XMPP domain — must match docker-jitsi-meet's default.
      JWT_SUB: ${JWT_SUB:-meet.jitsi}
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - frontend
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------- Observability --
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - "/:/host:ro,rslave"
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - monitoring

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_data:/tmp
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.think-deploy.com}
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${SMTP_HOST:-}
      GF_SMTP_USER: ${SMTP_USERNAME:-}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - frontend
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

# -------------------------------------------------------------------- Volumes --
# `name:` is pinned so the new stack reuses the volumes created by the old
# per-folder compose projects (rocketchat_*, monitoring_*). This preserves
# Rocket.Chat data, Grafana dashboards, and Prometheus/Loki history across
# the refactor. Remove the `name:` entries (or rename) for a clean slate.
volumes:
  mongodb_data:
    name: rocketchat_mongodb_data
  mongodb_config:
    name: comm-platform_mongodb_config
  prometheus_data:
    name: monitoring_prometheus_data
  loki_data:
    name: monitoring_loki_data
  promtail_data:
    name: comm-platform_promtail_data
  grafana_data:
    name: monitoring_grafana_data

# ------------------------------------------------------------------ Networks --
# - frontend  : services reachable from host Nginx (127.0.0.1 ports).
# - backend   : private inter-service network (Mongo <-> Rocket.Chat).
# - monitoring: Prometheus / Loki / Promtail / Grafana plus scraped apps.
networks:
  frontend:
    name: comm-frontend
  backend:
    name: comm-backend
    internal: true
  monitoring:
    name: comm-monitoring
