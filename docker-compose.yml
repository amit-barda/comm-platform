# =============================================================================
# Secure Communication Platform — single Docker Compose stack
# -----------------------------------------------------------------------------
# Everything runs as containers in this file:
#
#   * Nginx           — public TLS reverse proxy (only public entrypoint)
#   * Certbot         — Let's Encrypt issuance and auto-renewal
#   * Rocket.Chat     — chat app served at https://chat.think-deploy.com
#   * MongoDB         — Rocket.Chat datastore (private, internal network)
#   * Jitsi Meet      — video at https://video.think-deploy.com (web, prosody,
#                       jicofo, jvb)
#   * Observability   — Prometheus, Node Exporter, Loki, Promtail, Grafana
#                       (Grafana exposed at https://grafana.think-deploy.com)
#
# Public ports: only 80/tcp and 443/tcp on Nginx, plus 10000/udp on the JVB
# for Jitsi media. Every other service is reachable only over the internal
# Docker networks.
#
# Networks:
#   * proxy          — Nginx <-> public-facing services (rocketchat, jitsi-web,
#                      grafana). Carries no inter-app traffic.
#   * chat_backend   — Rocket.Chat <-> MongoDB. `internal: true`.
#   * video_backend  — Jitsi internal mesh (web/prosody/jicofo/jvb).
#   * monitoring     — Prometheus / Loki / Promtail / Grafana / scrape targets.
# =============================================================================

services:

  # ===========================================================================
  # Nginx — public reverse proxy / TLS termination
  # ===========================================================================
  nginx:
    build:
      context: ./nginx
    image: comm-platform/nginx:local
    container_name: nginx
    restart: unless-stopped
    depends_on:
      rocketchat:
        condition: service_started
      jitsi-web:
        condition: service_started
      grafana:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Certbot — Let's Encrypt issuance (one-shot, default `certbot` entrypoint)
  # -----------------------------------------------------------------------------
  # Use this service for ad-hoc commands such as initial issuance, e.g.:
  #
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
  #     --email "$LETSENCRYPT_EMAIL" --agree-tos --no-eff-email \
  #     -d chat.think-deploy.com -d video.think-deploy.com -d grafana.think-deploy.com
  #
  # `restart: "no"` keeps it from looping; renewal is handled by `certbot-renewer`.
  # ===========================================================================
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: certbot
    restart: "no"
    profiles:
      - tools
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - proxy

  # ===========================================================================
  # Certbot renewer — long-running loop, `certbot renew` every 12h
  # ===========================================================================
  certbot-renewer:
    image: certbot/certbot:v2.11.0
    container_name: certbot-renewer
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - proxy
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet --no-random-sleep-on-renew;
        sleep 12h & wait $${!};
      done"

  # ===========================================================================
  # MongoDB — Rocket.Chat datastore (private, internal network only)
  # ===========================================================================
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    command: >
      mongod
      --oplogSize 128
      --replSet rs0
      --storageEngine wiredTiger
      --bind_ip_all
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - chat_backend
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ===========================================================================
  # MongoDB replica-set initialiser (one-shot)
  # ===========================================================================
  mongodb-init:
    image: mongo:7.0
    container_name: mongodb-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - chat_backend
    command: >
      bash -c "
      mongosh --host mongodb:27017 --quiet --eval '
        try { rs.status(); print(\"replica set already initialised\"); }
        catch (e) {
          rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"mongodb:27017\" }] });
        }
      '"

  # ===========================================================================
  # Rocket.Chat — independent chat app at https://chat.think-deploy.com
  # ===========================================================================
  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:8.0.1
    container_name: rocketchat
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
    environment:
      ROOT_URL: https://chat.think-deploy.com
      PORT: 3000
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      DEPLOY_METHOD: docker
      MAIL_URL: ${ROCKETCHAT_MAIL_URL:-}
      OVERWRITE_SETTING_SMTP_Username: ${SMTP_USERNAME:-}
      OVERWRITE_SETTING_SMTP_Password: ${SMTP_PASSWORD:-}
    networks:
      - proxy
      - chat_backend
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/info >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ===========================================================================
  # Auth service — Google OAuth -> Jitsi JWT bridge
  # ---------------------------------------------------------------------------
  # Reachable as https://video.think-deploy.com/oauth/* (nginx routes /oauth/*
  # to this container). It signs JWTs that Prosody validates with JWT_SECRET.
  # ===========================================================================
  auth-service:
    build:
      context: ./auth-service
    image: comm-platform/auth-service:local
    container_name: auth-service
    restart: unless-stopped
    environment:
      PORT: 3001
      PUBLIC_BASE_URL: https://video.think-deploy.com/oauth
      JITSI_PUBLIC_URL: https://video.think-deploy.com
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_GOOGLE_DOMAIN: ${ALLOWED_GOOGLE_DOMAIN:-}
      JWT_APP_ID: ${JWT_APP_ID:-thinkdeploy}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-thinkdeploy}
      JWT_ISSUER: ${JWT_ISSUER:-thinkdeploy}
      JWT_SUB: ${JWT_SUB:-meet.jitsi}
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/oauth/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Jitsi web — frontend at https://video.think-deploy.com
  # ===========================================================================
  jitsi-web:
    image: jitsi/web:stable-9909
    container_name: jitsi-web
    restart: unless-stopped
    depends_on:
      jitsi-prosody:
        condition: service_started
    environment:
      TZ: ${TZ:-UTC}
      PUBLIC_URL: https://video.think-deploy.com
      ENABLE_AUTH: 1
      AUTH_TYPE: jwt
      ENABLE_GUESTS: 0
      ENABLE_LETSENCRYPT: 0
      DISABLE_HTTPS: 1
      ENABLE_HTTP_REDIRECT: 0
      ENABLE_XMPP_WEBSOCKET: 1
      ENABLE_COLIBRI_WEBSOCKET: 1
      TOKEN_AUTH_URL: https://video.think-deploy.com/oauth/google?room={room}
      JWT_APP_ID: ${JWT_APP_ID:-thinkdeploy}
      JWT_APP_SECRET: ${JWT_SECRET}
      JWT_ACCEPTED_ISSUERS: ${JWT_ISSUER:-thinkdeploy}
      JWT_ACCEPTED_AUDIENCES: ${JWT_AUDIENCE:-thinkdeploy}
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_RECORDER_DOMAIN: recorder.meet.jitsi
      XMPP_BOSH_URL_BASE: http://xmpp.meet.jitsi:5280
      XMPP_PORT: 5222
      ENABLE_RECORDING: 0
      ENABLE_TRANSCRIPTIONS: 0
    volumes:
      - jitsi_web_config:/config
      - jitsi_web_transcripts:/usr/share/jitsi-meet/transcripts
    networks:
      - proxy
      - video_backend

  # ===========================================================================
  # Jitsi prosody — XMPP server, internal only
  # ===========================================================================
  jitsi-prosody:
    image: jitsi/prosody:stable-9909
    container_name: jitsi-prosody
    restart: unless-stopped
    expose:
      - "5222"
      - "5269"
      - "5347"
      - "5280"
    environment:
      TZ: ${TZ:-UTC}
      AUTH_TYPE: jwt
      ENABLE_AUTH: 1
      ENABLE_GUESTS: 0
      ENABLE_LOBBY: 1
      ENABLE_BREAKOUT_ROOMS: 1
      ENABLE_XMPP_WEBSOCKET: 1
      GLOBAL_MODULES: ""
      GLOBAL_CONFIG: ""
      LOG_LEVEL: info
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_RECORDER_DOMAIN: recorder.meet.jitsi
      XMPP_PORT: 5222
      JWT_APP_ID: ${JWT_APP_ID:-thinkdeploy}
      JWT_APP_SECRET: ${JWT_SECRET}
      JWT_ACCEPTED_ISSUERS: ${JWT_ISSUER:-thinkdeploy}
      JWT_ACCEPTED_AUDIENCES: ${JWT_AUDIENCE:-thinkdeploy}
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JICOFO_AUTH_PASSWORD}
      JICOFO_COMPONENT_SECRET: ${JICOFO_COMPONENT_SECRET}
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: ${JVB_AUTH_PASSWORD}
      JIBRI_RECORDER_USER: recorder
      JIBRI_RECORDER_PASSWORD: ${JIBRI_RECORDER_PASSWORD:-}
      JIBRI_XMPP_USER: jibri
      JIBRI_XMPP_PASSWORD: ${JIBRI_XMPP_PASSWORD:-}
      JIGASI_XMPP_USER: jigasi
      JIGASI_XMPP_PASSWORD: ${JIGASI_XMPP_PASSWORD:-}
    volumes:
      - jitsi_prosody_config:/config
      - jitsi_prosody_plugins:/prosody-plugins-custom
    networks:
      video_backend:
        aliases:
          - xmpp.meet.jitsi
          - meet.jitsi
          - auth.meet.jitsi
          - guest.meet.jitsi
          - muc.meet.jitsi
          - internal-muc.meet.jitsi
          - recorder.meet.jitsi

  # ===========================================================================
  # Jitsi jicofo — focus / conference orchestrator, internal only
  # ===========================================================================
  jitsi-jicofo:
    image: jitsi/jicofo:stable-9909
    container_name: jitsi-jicofo
    restart: unless-stopped
    depends_on:
      jitsi-prosody:
        condition: service_started
    environment:
      TZ: ${TZ:-UTC}
      AUTH_TYPE: jwt
      ENABLE_AUTH: 1
      ENABLE_AUTO_OWNER: 1
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_RECORDER_DOMAIN: recorder.meet.jitsi
      XMPP_SERVER: xmpp.meet.jitsi
      XMPP_PORT: 5222
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JICOFO_AUTH_PASSWORD}
      JICOFO_COMPONENT_SECRET: ${JICOFO_COMPONENT_SECRET}
      JVB_BREWERY_MUC: jvbbrewery
      ENABLE_RECORDING: 0
    volumes:
      - jitsi_jicofo_config:/config
    networks:
      - video_backend

  # ===========================================================================
  # Jitsi jvb — video bridge (only service exposing a public UDP port)
  # ===========================================================================
  jitsi-jvb:
    image: jitsi/jvb:stable-9909
    container_name: jitsi-jvb
    restart: unless-stopped
    depends_on:
      jitsi-prosody:
        condition: service_started
    ports:
      - "10000:10000/udp"
    environment:
      TZ: ${TZ:-UTC}
      DOCKER_HOST_ADDRESS: ${JVB_ADVERTISE_IPS:-127.0.0.1}
      JVB_ADVERTISE_IPS: ${JVB_ADVERTISE_IPS:-}
      ENABLE_COLIBRI_WEBSOCKET: 1
      JVB_PORT: 10000
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: ${JVB_AUTH_PASSWORD}
      JVB_BREWERY_MUC: jvbbrewery
      JVB_WS_DOMAIN: video.think-deploy.com
      JVB_WS_SERVER_ID: jvb1
      PUBLIC_URL: https://video.think-deploy.com
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_SERVER: xmpp.meet.jitsi
      XMPP_PORT: 5222
    volumes:
      - jitsi_jvb_config:/config
    networks:
      - video_backend

  # ===========================================================================
  # Prometheus — metrics, internal only
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===========================================================================
  # Node Exporter — host metrics, internal only
  # ===========================================================================
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - monitoring

  # ===========================================================================
  # Loki — log aggregator, internal only
  # ===========================================================================
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # Promtail — Docker / host log shipper, internal only
  # ===========================================================================
  promtail:
    image: grafana/promtail:3.1.1
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    user: "0:0"
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_data:/tmp
    networks:
      - monitoring

  # ===========================================================================
  # Grafana — dashboards at https://grafana.think-deploy.com
  # ===========================================================================
  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.think-deploy.com
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${SMTP_HOST:-}
      GF_SMTP_USER: ${SMTP_USERNAME:-}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - proxy
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

# =============================================================================
# Volumes — all persistent state lives here
# =============================================================================
volumes:
  mongodb_data:
  mongodb_config:
  prometheus_data:
  loki_data:
  promtail_data:
  grafana_data:
  jitsi_web_config:
  jitsi_web_transcripts:
  jitsi_prosody_config:
  jitsi_prosody_plugins:
  jitsi_jicofo_config:
  jitsi_jvb_config:

# =============================================================================
# Networks — explicit, role-segmented
# =============================================================================
networks:
  proxy:
    name: comm_proxy
  chat_backend:
    name: comm_chat_backend
    internal: true
  video_backend:
    name: comm_video_backend
  monitoring:
    name: comm_monitoring
